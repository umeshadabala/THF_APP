<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Homely Food | Kitchen Management</title>
    <meta name="description" content="Manage orders, inventory, and spending for The Homely Food cloud kitchen.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="THF Kitchen">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-circle">THF</span>
                    <h1>The Homely Food</h1>
                </div>
                <div class="user-profile">
                    <button type="button" id="install-app-btn" class="install-btn hidden" aria-label="Install app">Install</button>
                    <span id="current-date"></span>
                </div>
            </div>
        </header>

        <!-- Main Content Area (Dynamic) -->
        <main id="main-content" class="fade-in">
            <!-- Content will be injected here by app.js -->
            <div id="loader" class="loader-container">
                <div class="loader"></div>
                <p>Connecting to Kitchen Database...</p>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="dashboard">
                <span class="icon">🏠</span>
                <span class="label">Home</span>
            </button>
            <button class="nav-item" data-view="orders">
                <span class="icon">📋</span>
                <span class="label">Orders</span>
            </button>
            <button class="nav-item" data-view="inventory">
                <span class="icon">📦</span>
                <span class="label">Stock</span>
            </button>
            <button class="nav-item" data-view="spending">
                <span class="icon">💰</span>
                <span class="label">Expenses</span>
            </button>
        </nav>

        <!-- Quick Add FAB -->
        <button id="quick-add" class="fab">
            <span>+</span>
        </button>

        <!-- Modal for adding items -->
        <div id="modal" class="modal hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2 id="modal-title">New Order</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div id="modal-body">
                    <!-- Form content injected here -->
                </div>
            </div>
        </div>

        <!-- Password Modal -->
        <div id="password-modal" class="modal hidden">
            <div class="modal-content glass" style="max-width: 340px;">
                <div class="modal-header">
                    <h2>🔒 Admin Access</h2>
                    <button class="close-password-modal">&times;</button>
                </div>
                <div style="padding: 5px 0;">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">Enter the admin password to continue.</p>
                    <input type="password" id="admin-password-input" placeholder="Password" style="width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:var(--text); font-size:1rem; box-sizing:border-box;">
                    <p id="password-error" style="color:var(--danger); font-size:0.8rem; margin-top:8px; display:none;">Incorrect password. Try again.</p>
                    <button id="password-submit-btn" class="btn-primary" style="width:100%; margin-top:15px;">Verify</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => console.log('PWA ready:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
